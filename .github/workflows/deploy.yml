name: Deploy v2 to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "v2/**"
      - "index.html"
      - "src/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: v2/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: v2
        run: pnpm install --ignore-scripts

      - name: Build v2
        working-directory: v2
        run: pnpm build

      - name: Assemble full site
        run: |
          mkdir -p _site/v2
          # v1 — preserve existing files at the site root
          cp index.html _site/
          cp verify.html _site/ 2>/dev/null || true
          cp -r src _site/
          # v2 — nest the Next.js static export under /v2/
          cp -r v2/out/. _site/v2/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
